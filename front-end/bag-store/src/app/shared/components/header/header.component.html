<ion-header>
  <ion-toolbar class="toolbar-style">
    <ion-buttons slot="start" *ngIf="backBtn">
      <ion-back-button
        defaultHref=""
        icon="chevron-back-outline"
        class="whiteText"
      >
      </ion-back-button>
    </ion-buttons>
    <ion-title> {{ title }} </ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="goToProfile()" *ngIf="profileBtn">
        <ion-icon
          class="cartIcon"
          name="person-circle-sharp"
          slot="icon-only"
        ></ion-icon>
      </ion-button>
      <ion-button (click)="goToCart()" *ngIf="cartBtn">
        <ion-icon
          class="cartIcon"
          name="cart-outline"
          slot="icon-only"
        ></ion-icon>
        <ion-badge color="danger">{{ cartCount }}</ion-badge>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>
