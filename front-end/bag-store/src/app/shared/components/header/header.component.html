<ion-header>
  <ion-toolbar class="toolbar-style">
    @if (backBtn) {
    <ion-buttons slot="start">
      <ion-back-button
        defaultHref=""
        icon="chevron-back-outline"
        class="whiteText"
      >
      </ion-back-button>
    </ion-buttons>
    }
    <ion-title> {{ title }} </ion-title>
    <ion-buttons slot="end">
      @if (profileBtn) {
      <ion-button (click)="goToProfile()">
        <ion-icon
          class="cartIcon"
          name="person-circle-sharp"
          slot="icon-only"
        ></ion-icon>
      </ion-button>
      } @if (cartBtn) {
      <ion-button (click)="goToCart()">
        <ion-icon
          class="cartIcon"
          name="cart-outline"
          slot="icon-only"
        ></ion-icon>
        <ion-badge color="danger">{{ cartCount }}</ion-badge>
      </ion-button>
      }
    </ion-buttons>
  </ion-toolbar>
</ion-header>
