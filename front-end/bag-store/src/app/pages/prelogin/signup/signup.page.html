<ion-content [fullscreen]="true" class="ion-no-padding">
  @if (isSplashScreenActive) {
  <div class="lottie-container">
    <ng-lottie
      class="lottie"
      [options]="options"
      (complete)="onAnimationComplete()"
      (animationCreated)="animationCreated($event)"
    ></ng-lottie>
  </div>
  }

  <div class="container">
    <h1>Bag Store</h1>
    <p>Join us today and start enjoying the best deals on bags</p>
  </div>

  <div class="form-container">
    <ion-segment
      [value]="selectedSegment()"
      (ionChange)="getSelectedSegment($event)"
      class="segment-container"
    >
      <ion-segment-button value="login" content-id="login">
        <ion-label>Log In</ion-label>
      </ion-segment-button>
      <ion-segment-button value="signup" content-id="signup">
        <ion-label>Sign Up</ion-label>
      </ion-segment-button>
    </ion-segment>
    <ion-segment-view>
      <!-- LOGIN -->
      <ion-segment-content id="login">
        <div [formGroup]="loginForm">
          <ion-list class="form-inputs">
            <!-- EMAIL -->
            <ion-item lines="none" class="items">
              <ion-input
                labelPlacement="floating"
                placeholder="Enter Email"
                errorText="Invalid email"
                formControlName="email"
              >
                <div slot="label">
                  Email <ion-text color="danger">*</ion-text>
                </div>
              </ion-input>
            </ion-item>

            <!-- PASSWORD -->
            <ion-item lines="none" class="items">
              <ion-input
                labelPlacement="floating"
                placeholder="Enter Password"
                errorText="Invalid password"
                type="password"
                formControlName="password"
              >
                <div slot="label">
                  Password <ion-text color="danger">*</ion-text>
                </div>
              </ion-input>
            </ion-item>
            <div class="w-100 ion-justify-content-center ion-display-flex">
              <ion-button (click)="login()" class="btns w-50">Login</ion-button>
            </div>

            <div
              class="ion-justify-content-between ion-align-items-center ion-display-flex"
            >
              <ion-checkbox labelPlacement="end">Remember me</ion-checkbox>
              <p>Fotgot password?</p>
            </div>
          </ion-list>
        </div>
      </ion-segment-content>
      <!-- SIGN UP -->
      <ion-segment-content id="signup">
        <div [formGroup]="signupForm">
          <ion-list class="form-inputs">
            <ion-item lines="none" class="items">
              <ion-input
                labelPlacement="floating"
                placeholder="Enter Name"
                formControlName="fullname"
                errorText="Invalid name"
              >
                <div slot="label">
                  Name <ion-text color="danger">*</ion-text>
                </div>
              </ion-input>
            </ion-item>

            <!-- EMAIL -->
            <ion-item lines="none" class="items">
              <ion-input
                labelPlacement="floating"
                placeholder="Enter Email"
                formControlName="email"
                errorText="Invalid email"
              >
                <div slot="label">
                  Email <ion-text color="danger">*</ion-text>
                </div>
              </ion-input>
            </ion-item>

            <!-- PASSWORD -->
            <ion-item lines="none" class="items">
              <ion-input
                labelPlacement="floating"
                placeholder="Enter Password"
                formControlName="password"
                errorText="Invalid password"
              >
                <div slot="label">
                  Password <ion-text color="danger">*</ion-text>
                </div>
              </ion-input>
            </ion-item>

            <ion-item lines="none" class="items">
              <ion-checkbox
                labelPlacement="end"
                formControlName="role"
                (ionChange)="isAdminTicket($event)"
              >
                <ion-label
                  >If you want to be registered as an Admin, kindly tick
                  here</ion-label
                >
              </ion-checkbox>
            </ion-item>
            <div class="w-100 ion-justify-content-center ion-display-flex">
              <ion-button (click)="signUp()" class="btns w-50"
                >Sign Up</ion-button
              >
            </div>
          </ion-list>
        </div>
      </ion-segment-content>
    </ion-segment-view>

    <div class="divider">
      <span>Or continue with</span>
    </div>

    <div class="social-grid">
      <ion-button fill="clear" class="social-btn">
        <ion-icon class="padright-5" name="logo-google"></ion-icon>
        Google
      </ion-button>
      <ion-button fill="clear" class="social-btn">
        <ion-icon class="padright-5" name="logo-apple"></ion-icon>
        Apple
      </ion-button>
    </div>
  </div>
</ion-content>
